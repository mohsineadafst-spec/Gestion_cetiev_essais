services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cetiev_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    command: >
      sh -c "composer install &&
             php artisan serve --host=0.0.0.0 --port=8000"

  redis:
    image: redis:7-alpine
    container_name: cetiev_redis
    ports:
      - "6379:6379"

  echo:
    image: node:22
    container_name: cetiev_echo
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "6001:6001"
    environment:
      APP_ENV: local
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: >
      sh -c "npm install -g laravel-echo-server &&
             laravel-echo-server start --config=/var/www/html/laravel-echo-server.json"
    depends_on:
      - app
      - redis

  vite:
    image: node:22
    container_name: cetiev_vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
      - echo
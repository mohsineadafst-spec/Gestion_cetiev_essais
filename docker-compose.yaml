services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cetiev_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    command: >
      sh -c "composer install &&
             php artisan serve --host=0.0.0.0 --port=8000"

  vite:
    image: node:22
    container_name: cetiev_vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"
    depends_on:
      - app